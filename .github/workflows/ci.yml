name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: ["22.19", 23]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - run: npm ci
      - run: npm run check
      - run: npm run build
      - run: npm test
      - run: npx tsx scripts/parity-check.ts
      - if: github.event_name == 'pull_request'
        run: npx tsx scripts/check-changelog.ts --base origin/main
