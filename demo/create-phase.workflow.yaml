name: create-phase
description: Convert unstructured intent into a structured phase spec
version: "1"

input:
  type: object
  required: [intent]
  properties:
    intent:
      type: string
      description: Unstructured intent from conversation — what needs to be built and why

steps:
  load-context:
    command: |
      node --experimental-strip-types -e "
        import fs from 'fs';
        const phases = fs.readdirSync('.workflow/phases')
          .filter(f => f.endsWith('.json'))
          .map(f => JSON.parse(fs.readFileSync('.workflow/phases/' + f, 'utf8')));
        const arch = JSON.parse(fs.readFileSync('.workflow/architecture.json', 'utf8'));
        const conv = JSON.parse(fs.readFileSync('.workflow/conventions.json', 'utf8'));
        const gaps = JSON.parse(fs.readFileSync('.workflow/gaps.json', 'utf8'));
        const inv = JSON.parse(fs.readFileSync('.workflow/inventory.json', 'utf8'));
        console.log(JSON.stringify({ phases, architecture: arch, conventions: conv, gaps: gaps.gaps, inventory: inv }));
      "
    output:
      format: json

  author:
    agent: phase-author
    input:
      intent: "${{ input.intent }}"
      phases: "${{ steps.load-context.output.phases }}"
      architecture: "${{ steps.load-context.output.architecture }}"
      conventions: "${{ steps.load-context.output.conventions }}"
      gaps: "${{ steps.load-context.output.gaps }}"
      inventory: "${{ steps.load-context.output.inventory }}"
    output:
      format: json
      schema: ../../.workflow/schemas/phase.schema.json

  write-phase:
    command: |
      node --experimental-strip-types -e "
        import fs from 'fs';
        import { validateFromFile } from './src/schema-validator.ts';
        const phase = JSON.parse(process.argv[1]);
        validateFromFile('.workflow/schemas/phase.schema.json', phase, 'phase');
        const filename = '.workflow/phases/' + String(phase.number).padStart(2, '0') + '-' + phase.name.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/-+$/, '') + '.json';
        fs.writeFileSync(filename, JSON.stringify(phase, null, 2) + '\n');
        console.log(JSON.stringify({ path: filename, phase_number: phase.number, spec_count: phase.specs.length }));
      " '${{ steps.author.output | json }}'
    output:
      format: json

completion:
  message: |
    Phase ${{ steps.write-phase.output.phase_number }} created at ${{ steps.write-phase.output.path }}
    Contains ${{ steps.write-phase.output.spec_count }} specs.
  include:
    - steps.author.output.success_criteria
    - steps.author.output.specs
