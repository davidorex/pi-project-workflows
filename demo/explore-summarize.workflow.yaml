name: explore-summarize
description: Explore a codebase path and summarize findings
version: "1"

input:
  type: object
  required: [path]
  properties:
    path:
      type: string
      description: File or directory path to explore
    question:
      type: string
      description: What to look for (optional)

steps:
  explore:
    agent: demo-explorer
    input:
      path: ${{ input.path }}
      question: ${{ input.question }}

  summarize:
    agent: demo-summarizer
    input:
      findings: ${{ steps.explore.textOutput }}
      question: ${{ input.question }}

completion:
  message: |
    Here are the exploration findings. Present them clearly to the user.
    If the user's original request implied a question, answer it directly.
    Don't preface with "the workflow found" — just present the information
    as if you explored it yourself. Do not end your response with a question to the user.

    ${{ steps.summarize.textOutput }}
