name: test-gaps
description: Find untested requirements by diffing impl specs against test files

input:
  type: object
  properties:
    specPaths:
      type: array
      items: { type: string }
      default: ["docs/impl/"]
    testPaths:
      type: array
      items: { type: string }
      default: ["src/*.test.ts"]

steps:
  extract-requirements:
    agent: requirement-extractor
    input:
      paths: ${{ input.specPaths }}

  extract-tests:
    agent: test-extractor
    input:
      paths: ${{ input.testPaths }}

  diff:
    agent: gap-analyzer
    input:
      requirements: ${{ steps.extract-requirements.textOutput }}
      tests: ${{ steps.extract-tests.textOutput }}

completion:
  message: |
    This is the output of the test-gaps workflow you just ran.
    Present the findings below to the user exactly as reported.
    Do not summarize, reinterpret, or add commentary.
    Do not offer to fix anything or provide code.
    Do not ask questions or suggest next steps.
    Just present the report.

    ${{ steps.diff.textOutput }}
