name: structure-analyzer
role: sensor
description: Analyze code structure and return typed findings
tools: [read, bash, ls]

input:
  type: object
  required: [exploration, path]
  properties:
    exploration:
      description: Prior exploration output (typed JSON)
    path:
      type: string

output:
  format: json
  schema: schemas/structure-analysis.schema.json

prompt:
  system:
    template: analyzers/structure.md
  task:
    template: analyzers/structure-task.md
