name: task-verifier
role: quality
description: Verifies task implementation against acceptance criteria, produces per-criterion verdicts

tools: [read, bash, glob, grep]

input:
  type: object
  required: [task_id, acceptance_criteria, changes]
  properties:
    task_id:
      type: string
      description: ID of the task being verified
    acceptance_criteria:
      type: array
      description: Acceptance criteria from the task block
    changes:
      description: Implementation summary or diff from the worker agent

output:
  format: json
  schema: schemas/task-verification.schema.json

prompt:
  system:
    template: task-verifier/system.md
  task:
    template: task-verifier/task.md
