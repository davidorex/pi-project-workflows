name: gap-to-phase
description: Create a phase spec from a gap — loads gap context, enriches with project state, dispatches phase-author
version: "1"

input:
  type: object
  required: [gap_id]
  properties:
    gap_id:
      type: string
      description: ID of the gap to convert into a phase
      source:
        file: .project/issues.json
        array: issues
        filter: { status: open }
        label: id
        value: id

steps:
  load-gap-blocks:
    block:
      read: issues
    output:
      format: json

  load-gap:
    command: |
      node -e "
        const data = JSON.parse(process.argv[1]);
        const gapId = process.argv[2];
        const gap = data.issues.find(g => g.id === gapId);
        if (!gap) { console.error('Gap not found: ' + gapId); process.exit(1); }
        if (gap.status === 'resolved') { console.error('Gap already resolved'); process.exit(1); }
        console.log(JSON.stringify({ gap }));
      " '${{ steps.load-gap-blocks.output | shell }}' '${{ input.gap_id }}'
    output:
      format: json

  load-phases:
    block:
      readDir: phases
    output:
      format: json

  load-context:
    block:
      read: [architecture, conventions, issues, inventory]
      optional: [architecture, conventions, inventory]
    output:
      format: json

  filter-gaps:
    command: |
      node -e "
        const data = JSON.parse(process.argv[1]);
        const open = (data.issues || []).filter(g => g.status === 'open');
        console.log(JSON.stringify(open));
      " '${{ steps.load-context.output.issues | shell }}'
    output:
      format: json

  author:
    agent: phase-author
    input:
      intent: "Implement gap ${{ steps.load-gap.output.gap.id }}: ${{ steps.load-gap.output.gap.description }}"
      gap: "${{ steps.load-gap.output.gap }}"
      phases: "${{ steps.load-phases.output }}"
      architecture: "${{ steps.load-context.output.architecture }}"
      conventions: "${{ steps.load-context.output.conventions }}"
      issues: "${{ steps.filter-gaps.output }}"
      inventory: "${{ steps.load-context.output.inventory }}"
    output:
      format: json
      schema: block:phase

  compute-phase-path:
    command: |
      node -e "
        const phase = JSON.parse(process.argv[1]);
        const num = String(phase.number).padStart(2, '0');
        const name = phase.name.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/-+$/g, '');
        console.log(JSON.stringify({ path: 'phases/' + num + '-' + name }));
      " '${{ steps.author.output | shell }}'
    output:
      format: json

  write-phase:
    block:
      write:
        name: phase
        data: "${{ steps.author.output }}"
        path: "${{ steps.compute-phase-path.output.path }}"
    output:
      format: json

completion:
  message: |
    Phase ${{ steps.author.output.number }} created: ${{ steps.write-phase.output.path }}
    Specs: ${{ steps.author.output.specs | length }}
    From gap: ${{ input.gap_id }}
  include:
    - steps.author.output
